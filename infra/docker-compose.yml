version: '3.8'

services:
  # El Frontend recibe obligatoriamente el tráfico público en el puerto 80
  frontend:
    image: dgimenezdeveloper/chatbot-frontend:latest
    ports:
      - "80:3000"
    depends_on:
      - api

  # El Backend corre de forma privada en el puerto 8000
  api:
    image: dgimenezdeveloper/chatbot-backend:latest
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      - db
      - redis

  # Base de datos con credenciales explícitas
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db

  # Broker de Redis
  redis:
    image: redis:7-alpine