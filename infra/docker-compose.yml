version: '3.8'

services:
  # El Frontend recibe todo el tráfico público en el puerto 80 de Azure
  frontend:
    image: dgimenezdeveloper/chatbot-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - api

  # El Backend corre internamente en el puerto 8000
  api:
    image: dgimenezdeveloper/chatbot-backend:latest
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      - db
      - redis

  # Base de datos con credenciales explícitas (Sin interpolación para que Azure no falle)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  # Broker de Redis
  redis:
    image: redis:7-alpine

volumes:
  postgres_prod_data: