version: '3.8'

services:
  # La única puerta de entrada al mundo exterior
  frontend:
    image: dgimenezdeveloper/chatbot-frontend:latest
    ports:
      - "80:3000"

  # API privada, expuesta solo internamente a Next.js
  api:
    image: dgimenezdeveloper/chatbot-backend:latest
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app/backend

  # Base de datos limpia y aislada
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db

  # Redis aislado
  redis:
    image: redis:7-alpine