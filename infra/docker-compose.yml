version: '3.8'

services:
  # El Frontend (Next.js) responde al puerto público
  frontend:
    image: dgimenezdeveloper/chatbot-frontend:latest
    ports:
      - "3000:3000"
    
  # El Backend (FastAPI) expone su puerto interno 8000
  api:
    image: dgimenezdeveloper/chatbot-backend:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/backend

  # Base de datos limpia sin volumen anclado (Garantiza arranque seguro)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db

  # Redis para la sesión
  redis:
    image: redis:7-alpine