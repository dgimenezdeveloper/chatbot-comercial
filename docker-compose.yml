services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot123}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_db}
    ports:
      - "5432:5432"
    volumes:
      - chatbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-chatbot} -d $${POSTGRES_DB:-chatbot_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - chatbot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - api

volumes:
  chatbot_postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/tmp/chatbot_postgres_data
  chatbot_redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/tmp/chatbot_redis_data
