name: Strict Role Isolation
description: Enforce strict role isolation reading dynamically from CODEOWNERS
on:
  pull_request:
    branches: [main, develop]

jobs:
  enforce-roles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar permisos dinámicos desde CODEOWNERS
        run: |
          ACTOR="${{ github.actor }}"
          CODEOWNERS_FILE=".github/CODEOWNERS"
          if [ ! -f "$CODEOWNERS_FILE" ]; then
            CODEOWNERS_FILE="CODEOWNERS"
          fi

          echo "🔍 Analizando permisos para @$ACTOR en $CODEOWNERS_FILE..."

          ALLOWED_PATHS=$(grep "@$ACTOR\b" "$CODEOWNERS_FILE" | awk '{print $1}' | sed 's/^\///')

          if [ -z "$ALLOWED_PATHS" ]; then
            echo "⚠️ Error: El usuario @$ACTOR no está asignado a ninguna carpeta en CODEOWNERS."
            echo "Bloqueando el Pull Request por seguridad."
            exit 1
          fi

          echo "✅ Rutas permitidas encontradas:"
          echo "$ALLOWED_PATHS"
          echo "----------------------------------------"

          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)

          for FILE in $CHANGED_FILES; do
            FILE_DIR=$(dirname "$FILE")
            IS_ALLOWED=false
            
            for PATH_PREFIX in $ALLOWED_PATHS; do
              if [[ "$FILE" == "$PATH_PREFIX"* ]]; then
                IS_ALLOWED=true
                break
              fi
            done

            if [ "$IS_ALLOWED" = false ]; then
              echo "❌ ERROR DE PERMISOS: @$ACTOR intentó modificar el archivo '$FILE'."
              echo "📁 Directorio detectado: '$FILE_DIR/'"
              echo "🚫 No figurás como propietario en CODEOWNERS para esta ruta."
              exit 1
            fi
          done
          
          echo "🚀 Validación exitosa. Todos los cambios están dentro de las áreas permitidas."