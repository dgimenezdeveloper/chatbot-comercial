name: CI/CD Pipeline - Chatbot Comercial

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # =============================================================================
  # ETAPA 1: INTEGRACIÓN CONTINUA (CI) - BACKEND & FRONTEND
  # =============================================================================
  ci:
    name: Integración Continuo (CI)
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Descargar Código (Checkout)
        uses: actions/checkout@v4

      # --- CI Backend ---
      - name: Configurar Entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Dependencias del Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest

      - name: Ejecutar Linter (Python)
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Ejecutar Pruebas Backend (Pytest)
        env:
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "test_secret_key_internal_pipeline_123"
          APP_ENV: "development"
          WHATSAPP_TOKEN: "mock_token_verification"
          WHATSAPP_VERIFY_TOKEN: "mock_verify_token"
          WHATSAPP_PHONE_NUMBER_ID: "mock_phone_id"
          WHATSAPP_BUSINESS_ACCOUNT_ID: "mock_business_id"
          GOOGLE_CLIENT_ID: "mock_google_id"
          GOOGLE_CLIENT_SECRET: "mock_google_secret"
          GOOGLE_REDIRECT_URI: "http://localhost:8000/api/v1/auth/callback"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          POSTGRES_DB: "test"
        run: |
          if [ -d "backend/tests" ] && find backend/tests -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest backend/tests/
          else
            echo "No se encontraron archivos de pruebas unitarias (test_*.py o *_test.py). Continuando..."
          fi

      # --- CI Frontend ---
      - name: Configurar Entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Instalar Dependencias del Frontend
        run: |
          cd frontend
          pnpm install

      - name: Validar Compilación del Frontend (Next.js)
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
        run: |
          cd frontend
          pnpm build

  # =============================================================================
  # ETAPA 2: DESPLIEGUE CONTINUO (CD) - DOCKER HUB & AZURE DEPLOY
  # =============================================================================
  deploy:
    name: Despliegue Continuo (CD)
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      .github/workflows/ci-cd.yml

      # --- Despliegue en Azure (Actualizado a v2 y v3 para silenciar advertencias de Node 20) ---
      - name: Iniciar Sesión en Azure
        uses: azure/login@v2  # <--- ACTUALIZADO A V2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Desplegar en Azure Web App para Contenedores
        uses: azure/webapps-deploy@v3  # <--- ACTUALIZADO A V3
        with:
          app-name: 'pymebot'
          configuration-file: 'infra/docker-compose.yml'