name: CI/CD Pipeline - Chatbot Comercial

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # =============================================================================
  # ETAPA 1: INTEGRACIÓN CONTINUA (CI) - BACKEND & FRONTEND
  # =============================================================================
  ci:
    name: Integración Continua (CI)
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Descargar Código (Checkout)
        uses: actions/checkout@v4

      # --- CI Backend ---
      - name: Configurar Entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Dependencias del Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest

      - name: Ejecutar Linter (Python)
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Ejecutar Pruebas Backend (Pytest)
        env:
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "test_secret_key_internal_pipeline_123"
          APP_ENV: "development"
          WHATSAPP_TOKEN: "mock_token_verification"
          WHATSAPP_VERIFY_TOKEN: "mock_verify_token"
          WHATSAPP_PHONE_NUMBER_ID: "mock_phone_id"
          WHATSAPP_BUSINESS_ACCOUNT_ID: "mock_business_id"
          GOOGLE_CLIENT_ID: "mock_google_id"
          GOOGLE_CLIENT_SECRET: "mock_google_secret"
          GOOGLE_REDIRECT_URI: "http://localhost:8000/api/v1/auth/callback"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          POSTGRES_DB: "test"
        run: |
          # Verificamos si la carpeta existe Y contiene archivos de prueba reales (test_*.py o *_test.py)
          if [ -d "backend/tests" ] && find backend/tests -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest backend/tests/
          else
            echo "No se encontraron archivos de pruebas unitarias (test_*.py o *_test.py). Continuando..."
          fi

      # --- CI Frontend ---
      - name: Configurar Entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Instalar Dependencias del Frontend
        run: |
          cd frontend
          pnpm install

      - name: Validar Compilación del Frontend (Next.js)
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
        run: |
          cd frontend
          pnpm build

  # =============================================================================
  # ETAPA 2: DESPLIEGUE CONTINUO (CD) - DOCKER HUB & AZURE DEPLOY
  # =============================================================================
  deploy:
    name: Despliegue Continuo (CD)
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar Sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Compilar y subir BACKEND ---
      - name: Construir y Subir Imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            dgimenezdeveloper/chatbot-backend:latest
            dgimenezdeveloper/chatbot-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Compilar y subir FRONTEND (Inyectando la URL real de pymebot) ---
      - name: Construir y Subir Imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            dgimenezdeveloper/chatbot-frontend:latest
            dgimenezdeveloper/chatbot-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://pymebot.azurewebsites.net/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Despliegue en Azure ---
      - name: Iniciar Sesión en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Desplegar en Azure Web App para Contenedores
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'pymebot'
          configuration-file: 'infra/docker-compose.yml'