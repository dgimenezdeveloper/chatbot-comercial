  # Cómo usar:
  #   GitHub → Actions → "Auto Move Issues - Project Board"
  #   → "Run workflow" → elegir dry_run=true para probar primero
  # ============================================================
  backfill_existing_issues:
    name: "[Manual] Migrar issues existentes al Project Board"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Obtener datos del proyecto
