          IN_PROGRESS_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name == "In Progress") | .id')
          IN_REVIEW_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name == "In Review") | .id')

          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "STATUS_FIELD_ID=$STATUS_FIELD_ID" >> $GITHUB_OUTPUT
          echo "READY_ID=$READY_ID" >> $GITHUB_OUTPUT
          echo "IN_PROGRESS_ID=$IN_PROGRESS_ID" >> $GITHUB_OUTPUT
          echo "IN_REVIEW_ID=$IN_REVIEW_ID" >> $GITHUB_OUTPUT

          echo "✅ Datos del proyecto obtenidos. ID: $PROJECT_ID"

      - name: Migrar issues ABIERTAS y ASIGNADAS → READY
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          PROJECT_ID: ${{ steps.project.outputs.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ steps.project.outputs.STATUS_FIELD_ID }}
          READY_ID: ${{ steps.project.outputs.READY_ID }}
        run: |
          echo "=== Buscando issues abiertas y asignadas ==="

          # Obtener todas las issues abiertas con asignados (paginado)
          PAGE=1
          TOTAL_MOVED=0

          while true; do
            ISSUES=$(gh api "/repos/${{ github.repository }}/issues?state=open&per_page=100&page=$PAGE" \
              --jq '[.[] | select(.pull_request == null) | select(.assignees | length > 0) | {number: .number, node_id: .node_id, title: .title, assignees: [.assignees[].login]}]')

            COUNT=$(echo "$ISSUES" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            echo "Página $PAGE: $COUNT issues encontradas"

            echo "$ISSUES" | jq -c '.[]' | while IFS= read -r ISSUE; do
              ISSUE_NUM=$(echo "$ISSUE" | jq -r '.number')
              ISSUE_ID=$(echo "$ISSUE" | jq -r '.node_id')
              ISSUE_TITLE=$(echo "$ISSUE" | jq -r '.title')
              ASSIGNEES=$(echo "$ISSUE" | jq -r '.assignees | join(", ")')

              if [ "$DRY_RUN" = "true" ]; then
                echo "[DRY RUN] Issue #$ISSUE_NUM '$ISSUE_TITLE' (asignada a: $ASSIGNEES) → READY"
              else
                ITEM_ID=$(gh api graphql -f query='
                  mutation($project: ID!, $issue: ID!) {
                    addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                      item { id }
                    }
                  }' \
                  -f project="$PROJECT_ID" \
                  -f issue="$ISSUE_ID" \
                  --jq '.data.addProjectV2ItemById.item.id')

                gh api graphql -f query='
                  mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $project,
                      itemId: $item,
                      fieldId: $field,
                      value: { singleSelectOptionId: $option }
                    }) {
                      projectV2Item { id }
                    }
                  }' \
                  -f project="$PROJECT_ID" \
                  -f item="$ITEM_ID" \
                  -f field="$STATUS_FIELD_ID" \
                  -f option="$READY_ID" \
                  --silent

                echo "✅ Issue #$ISSUE_NUM '$ISSUE_TITLE' → READY (asignada a: $ASSIGNEES)"
              fi
            done

            PAGE=$((PAGE + 1))
          done

      - name: Migrar PRs ABIERTOS → IN REVIEW
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          PROJECT_ID: ${{ steps.project.outputs.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ steps.project.outputs.STATUS_FIELD_ID }}
          IN_REVIEW_ID: ${{ steps.project.outputs.IN_REVIEW_ID }}
        run: |
          echo "=== Buscando PRs abiertos hacia develop ==="

          PRS=$(gh pr list --repo ${{ github.repository }} --base develop --state open --json number,id,title --limit 100)
          COUNT=$(echo "$PRS" | jq 'length')
          echo "PRs abiertos hacia develop: $COUNT"

          echo "$PRS" | jq -c '.[]' | while IFS= read -r PR; do
            PR_NUM=$(echo "$PR" | jq -r '.number')
            PR_NODE_ID=$(echo "$PR" | jq -r '.id')
            PR_TITLE=$(echo "$PR" | jq -r '.title')

            # Obtener issues que cierra este PR
            CLOSING=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 25) {
                      nodes { id number title }
                    }
                  }
                }
              }' \
              -f owner="${{ github.repository_owner }}" \
              -f repo="${{ github.event.repository.name }}" \
              -F number=$PR_NUM \
              --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[]' 2>/dev/null || echo "")

            if [ -z "$CLOSING" ]; then
              echo "⚠️  PR #$PR_NUM '$PR_TITLE' no tiene issues vinculadas"
            else
              echo "$CLOSING" | jq -r '.number' | while IFS= read -r ISSUE_NUM; do
                ISSUE_NODE=$(echo "$CLOSING" | jq -r "select(.number == $ISSUE_NUM) | .id")
                ISSUE_TITLE=$(echo "$CLOSING" | jq -r "select(.number == $ISSUE_NUM) | .title")

                if [ "$DRY_RUN" = "true" ]; then
                  echo "[DRY RUN] Issue #$ISSUE_NUM '$ISSUE_TITLE' (PR #$PR_NUM) → IN REVIEW"
                else
                  ITEM_ID=$(gh api graphql -f query='
                    mutation($project: ID!, $issue: ID!) {
                      addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                        item { id }
                      }
                    }' \
                    -f project="$PROJECT_ID" \
                    -f issue="$ISSUE_NODE" \
                    --jq '.data.addProjectV2ItemById.item.id')

                  gh api graphql -f query='
                    mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $project,
                        itemId: $item,
                        fieldId: $field,
                        value: { singleSelectOptionId: $option }
                      }) {
                        projectV2Item { id }
                      }
                    }' \
                    -f project="$PROJECT_ID" \
                    -f item="$ITEM_ID" \
                    -f field="$STATUS_FIELD_ID" \
                    -f option="$IN_REVIEW_ID" \
                    --silent

                  echo "👀 Issue #$ISSUE_NUM '$ISSUE_TITLE' → IN REVIEW (PR #$PR_NUM)"
                fi
              done
            fi
          done

          if [ "$DRY_RUN" = "true" ]; then
            echo ""
            echo "=== DRY RUN completado. Ningún cambio fue aplicado. ==="
            echo "=== Para aplicar los cambios, ejecutá el workflow con dry_run=false ==="
          else
            echo ""
            echo "=== Migración completada ==="
          fi
