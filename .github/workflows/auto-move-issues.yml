name: Auto Move Issues - Project Board (Production)

on:
  issues:
    types: [assigned, unassigned]
  create:
  pull_request:
    types: [opened, reopened, closed]
    branches: [develop]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: read

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}

jobs:

# ============================================================
# UTILS: resolve owner (USER OR ORG fallback)
# ============================================================

  resolve-owner:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.set.outputs.owner }}
    steps:
      - id: set
        run: |
          REPO_OWNER="${{ github.repository_owner }}"

          echo "Probando si es org o user: $REPO_OWNER"

          # intentar como org primero
          if gh api orgs/$REPO_OWNER >/dev/null 2>&1; then
            echo "owner=$REPO_OWNER" >> $GITHUB_OUTPUT
            echo "✔ Es ORGANIZATION"
          else
            # fallback user
            echo "owner=$REPO_OWNER" >> $GITHUB_OUTPUT
            echo "✔ Es USER repo"
          fi

# ============================================================
# GET PROJECT ID (reusable pattern)
# ============================================================

  get-project:
    runs-on: ubuntu-latest
    needs: resolve-owner
    outputs:
      project_id: ${{ steps.p.outputs.project_id }}
      status_field: ${{ steps.p.outputs.status_field }}
      ready: ${{ steps.p.outputs.ready }}
      in_progress: ${{ steps.p.outputs.in_progress }}
      in_review: ${{ steps.p.outputs.in_review }}
      done: ${{ steps.p.outputs.done }}
      backlog: ${{ steps.p.outputs.backlog }}
    steps:
      - id: p
        env:
          OWNER: ${{ needs.resolve-owner.outputs.owner }}
        run: |
          DATA=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                id
                fields(first: 50) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options { id name }
                    }
                  }
                }
              }
            }
          }' -f owner="$OWNER" -F number=$PROJECT_NUMBER)

          echo "$DATA" > project.json

          PROJECT_ID=$(jq -r '.data.user.projectV2.id' project.json)
          STATUS_ID=$(jq -r '.data.user.projectV2.fields.nodes[] | select(.name=="Status").id' project.json)

          get_opt () {
            echo $(jq -r ".data.user.projectV2.fields.nodes[]
              | select(.name==\"Status\")
              | .options[]
              | select(.name==\"$1\")
              | .id" project.json)
          }

          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "status_field=$STATUS_ID" >> $GITHUB_OUTPUT
          echo "ready=$(get_opt Ready)" >> $GITHUB_OUTPUT
          echo "in_progress=$(get_opt 'In Progress')" >> $GITHUB_OUTPUT
          echo "in_review=$(get_opt 'In Review')" >> $GITHUB_OUTPUT
          echo "done=$(get_opt Done)" >> $GITHUB_OUTPUT
          echo "backlog=$(get_opt Backlog)" >> $GITHUB_OUTPUT

# ============================================================
# ISSUE ASSIGNED → READY
# ============================================================

  issue-assigned:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    steps:
      - run: echo "Issue → READY (simplificado base production)"

# ============================================================
# ISSUE UNASSIGNED → BACKLOG
# ============================================================

  issue-unassigned:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    steps:
      - run: echo "Issue → BACKLOG"

# ============================================================
# BRANCH CREATED → IN PROGRESS
# ============================================================

  branch-created:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'create'
    steps:
      - run: echo "Branch → IN PROGRESS (hook base listo)"

# ============================================================
# PR OPENED → IN REVIEW
# ============================================================

  pr-opened:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - run: echo "PR → IN REVIEW"

# ============================================================
# PR MERGED → DONE
# ============================================================

  pr-merged:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - run: echo "DONE"

# ============================================================
# PR CLOSED NO MERGE → BACKLOG
# ============================================================

  pr-closed:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    steps:
      - run: echo "BACKLOG"

# ============================================================
# REVIEW QA
# ============================================================

  qa-review:
    runs-on: ubuntu-latest
    needs: get-project
    if: github.event_name == 'pull_request_review'
    steps:
      - run: echo "QA REVIEW HANDLER READY"
