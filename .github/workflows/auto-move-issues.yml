# ============================================================
# auto-move-issues.yml
# Automatiza el movimiento de tarjetas en GitHub Projects v2
# según el estado del ciclo de vida de issues y PRs.
#
# FLUJO DE ESTADOS:
#   BACKLOG → READY → IN PROGRESS → IN REVIEW → QA APPROVED → DONE
#                                  ↑___QA rechaza___|
#
# COLUMNAS REQUERIDAS en el Project Board (campo "Status"):
#   - Backlog
#   - Ready
#   - In Progress
#   - In Review
#   - QA Approved
#   - Done
#
# SECRETS requeridos (Settings → Secrets):
#   - PROJECT_TOKEN : PAT clásico con scopes: project, repo, read:org
#
# VARIABLES requeridas (Settings → Variables):
#   - PROJECT_NUMBER : Número del proyecto (ej: 5 si la URL es /projects/5)
#   - ORGANIZATION   : Nombre de la org o usuario owner del proyecto
#   - QA_GITHUB_USERS: Usernames de GitHub de los QA, separados por espacio
#                      Ej: "qa-user1 qa-user2"
#
# BRANCH PROTECTIONS recomendadas en 'develop':
#   - Require PR before merging
#   - Require 1 approval
#   - Restrict merges a: dgimenezdeveloper, rcrossa
# ============================================================

name: Auto Move Issues - Project Board

on:
  # Trigger 1: Issue asignada → READY
  # Trigger 2: Issue desasignada → BACKLOG
  issues:
    types: [assigned, unassigned]

  # Trigger 3: Branch creada → IN PROGRESS (si el nombre contiene número de issue)
  create:

  # Trigger 4: PR abierto/reabierto → IN REVIEW + notifica QA
  # Trigger 5: PR mergeado a develop → DONE
  # Trigger 6: PR cerrado sin merge → BACKLOG
  pull_request:
    types: [opened, closed, reopened]
    branches:
      - develop

  # Trigger 7: Review de QA Aprobada → QA APPROVED + notifica maintainers
  # Trigger 8: Review de QA Rechazada → IN PROGRESS + comenta en issue
  pull_request_review:
    types: [submitted]

  # Trigger 9: Ejecución manual para migrar issues EXISTENTES (asignadas antes de crear este workflow)
  # Uso: Actions → "Auto Move Issues" → "Run workflow"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Modo prueba (true = solo muestra qué haría, sin mover nada)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Permisos necesarios para comentar en issues/PRs y leer repositorio
permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:

  # ============================================================
  # JOB 1: BACKLOG → READY
  # Se activa cuando una issue es asignada a alguien
  # ============================================================
  move_to_ready:
    name: "Issue asignada → READY"
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Mover issue a columna Ready
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ vars.ORGANIZATION }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
        run: |
          # Obtener datos del proyecto y del campo Status
          gh api graphql -f query='\
            query($owner: String!, $number: Int!) {\
              organization: organization(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
              user: user(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
            }' \
            -f owner="$ORGANIZATION" \
            -F number=$PROJECT_NUMBER \
            > project_data.json

          # Extraer IDs de forma robusta (soporta Organization o User)
          PROJECT_ID=$(jq -r 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.id elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.id else empty end' project_data.json)
          STATUS_DATA=$(jq -c 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.fields.nodes[] elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.fields.nodes[] else empty end | select(.name == "Status")' project_data.json | head -n 1)
          STATUS_FIELD_ID=$(echo "$STATUS_DATA" | jq -r '.id')
          READY_OPTION_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name == "Ready") | .id')

          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "STATUS_FIELD_ID=$STATUS_FIELD_ID" >> $GITHUB_ENV
          echo "READY_OPTION_ID=$READY_OPTION_ID" >> $GITHUB_ENV

          # Agregar issue al proyecto (si ya existe, devuelve el item existente)
          ITEM_ID=$(gh api graphql -f query='
            mutation($project: ID!, $issue: ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                item { id }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f issue="$ISSUE_ID" \
            --jq '.data.addProjectV2ItemById.item.id')

          # Actualizar el campo Status a "Ready"
          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project,
                itemId: $item,
                fieldId: $field,
                value: { singleSelectOptionId: $option }
              }) {
                projectV2Item { id }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f item="$ITEM_ID" \
            -f field="$STATUS_FIELD_ID" \
            -f option="$READY_OPTION_ID" \
            --silent

          echo "✅ Issue #${{ github.event.issue.number }} movida a READY (asignada a ${{ github.event.assignee.login }})"

  # ============================================================
  # JOB 2: READY → BACKLOG
  # Se activa cuando se quita la asignación de una issue
  # ============================================================
  move_to_backlog_unassigned:
    name: "Issue desasignada → BACKLOG"
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    runs-on: ubuntu-latest
    steps:
      - name: Mover issue a columna Backlog
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ vars.ORGANIZATION }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
        run: |
          gh api graphql -f query='\
            query($owner: String!, $number: Int!) {\
              organization: organization(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
              user: user(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
            }' \
            -f owner="$ORGANIZATION" \
            -F number=$PROJECT_NUMBER \
            > project_data.json

          PROJECT_ID=$(jq -r 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.id elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.id else empty end' project_data.json)
          STATUS_DATA=$(jq -c 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.fields.nodes[] elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.fields.nodes[] else empty end | select(.name == "Status")' project_data.json | head -n 1)
          STATUS_FIELD_ID=$(echo "$STATUS_DATA" | jq -r '.id')
          BACKLOG_OPTION_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name == "Backlog") | .id')

          ITEM_ID=$(gh api graphql -f query='
            mutation($project: ID!, $issue: ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                item { id }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f issue="$ISSUE_ID" \
            --jq '.data.addProjectV2ItemById.item.id')

          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project,
                itemId: $item,
                fieldId: $field,
                value: { singleSelectOptionId: $option }
              }) {
                projectV2Item { id }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f item="$ITEM_ID" \
            -f field="$STATUS_FIELD_ID" \
            -f option="$BACKLOG_OPTION_ID" \
            --silent

          echo "📋 Issue #${{ github.event.issue.number }} movida a BACKLOG (desasignada)"

  # ============================================================
  # JOB 3: READY → IN PROGRESS
  # Se activa cuando se crea una branch cuyo nombre contiene
  # el número de una issue (ej: feature/42-login, 42-login, fix/42)
  # ============================================================
  move_to_in_progress:
    name: "Branch creada → IN PROGRESS"
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Extraer número de issue del nombre de la branch
        id: extract_issue
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch detectada: $BRANCH"

          # Extraer primer número encontrado en el nombre de la branch
          # Soporta: feature/42-titulo, 42-titulo, fix/42, ISSUE-42
          ISSUE_NUMBER=$(echo "$BRANCH" | grep -oP '(?<![0-9])\d+(?![0-9])' | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No se encontró número de issue en la branch '$BRANCH'. Saltando."
            echo "ISSUE_FOUND=false" >> $GITHUB_OUTPUT
          else
            echo "Issue encontrada: #$ISSUE_NUMBER"
            echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
            echo "ISSUE_FOUND=true" >> $GITHUB_OUTPUT
          fi

      - name: Obtener node_id de la issue
        if: steps.extract_issue.outputs.ISSUE_FOUND == 'true'
        id: get_issue
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.ISSUE_NUMBER }}
        run: |
          ISSUE_DATA=$(gh api /repos/${{ github.repository }}/issues/$ISSUE_NUMBER 2>/dev/null || echo "null")

          if [ "$ISSUE_DATA" = "null" ]; then
            echo "Issue #$ISSUE_NUMBER no encontrada en este repo."
            echo "ISSUE_VALID=false" >> $GITHUB_OUTPUT
          else
            ISSUE_ID=$(echo "$ISSUE_DATA" | jq -r '.node_id')
            echo "ISSUE_ID=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "ISSUE_VALID=true" >> $GITHUB_OUTPUT
          fi

      - name: Mover issue a IN PROGRESS
        if: steps.get_issue.outputs.ISSUE_VALID == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ vars.ORGANIZATION }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          ISSUE_ID: ${{ steps.get_issue.outputs.ISSUE_ID }}
        run: |
          gh api graphql -f query='\
            query($owner: String!, $number: Int!) {\
              organization: organization(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
              user: user(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
            }' \
            -f owner="$ORGANIZATION" \
            -F number=$PROJECT_NUMBER \
            > project_data.json

          PROJECT_ID=$(jq -r 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.id elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.id else empty end' project_data.json)
          STATUS_DATA=$(jq -c 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.fields.nodes[] elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.fields.nodes[] else empty end | select(.name == "Status")' project_data.json | head -n 1)
          STATUS_FIELD_ID=$(echo "$STATUS_DATA" | jq -r '.id')
          IN_PROGRESS_OPTION_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name == "In Progress") | .id')

          ITEM_ID=$(gh api graphql -f query='
            mutation($project: ID!, $issue: ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                item { id }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f issue="$ISSUE_ID" \
            --jq '.data.addProjectV2ItemById.item.id')

          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project,
                itemId: $item,
                fieldId: $field,
                value: { singleSelectOptionId: $option }
              }) {
                projectV2Item { id }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f item="$ITEM_ID" \
            -f field="$STATUS_FIELD_ID" \
            -f option="$IN_PROGRESS_OPTION_ID" \
            --silent

          echo "🔄 Issue #${{ steps.extract_issue.outputs.ISSUE_NUMBER }} movida a IN PROGRESS (branch: ${{ github.ref_name }})"

  # ============================================================
  # JOB 4: IN PROGRESS → IN REVIEW
  # Se activa cuando se abre un PR hacia develop
  # También agrega el PR al proyecto y notifica a los QA
  # ============================================================
  move_to_in_review:
    name: "PR abierto → IN REVIEW + Notifica QA"
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Obtener issues vinculadas al PR y moverlas a IN REVIEW
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ vars.ORGANIZATION }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Obtener datos del proyecto
          gh api graphql -f query='\
            query($owner: String!, $number: Int!) {\
              organization: organization(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
              user: user(login: $owner) {\
                projectV2(number: $number) {\
                  id\
                  fields(first: 50) {\
                    nodes {\
                      ... on ProjectV2SingleSelectField {\
                        id\
                        name\
                        options { id name }\
                      }\
                    }\
                  }\
                }\
              }\
            }' \
            -f owner="$ORGANIZATION" \
            -F number=$PROJECT_NUMBER \
            > project_data.json

          PROJECT_ID=$(jq -r 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.id elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.id else empty end' project_data.json)
          STATUS_DATA=$(jq -c 'if .data.organization != null and .data.organization.projectV2 != null then .data.organization.projectV2.fields.nodes[] elif .data.user != null and .data.user.projectV2 != null then .data.user.projectV2.fields.nodes[] else empty end | select(.name == "Status")' project_data.json | head -n 1)
          STATUS_FIELD_ID=$(echo "$STATUS_DATA" | jq -r '.id')
          IN_REVIEW_OPTION_ID=$(echo "$STATUS_DATA" | jq -r '.options[] | select(.name == "In Review") | .id')

          # Obtener issues que cierra este PR (via "closes #N", "fixes #N", etc.)
          CLOSING_ISSUES=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  closingIssuesReferences(first: 25) {
                    nodes { id number }
                  }
                }
              }
            }' \
            -f owner="$REPO_OWNER" \
            -f repo="$REPO_NAME" \
            -F number=$PR_NUMBER \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[]')

          # Si no encontró issues via "Closes #N", intentar extraer del nombre de la rama
          if [ -z "$CLOSING_ISSUES" ]; then
            echo "No se encontraron keywords 'closes/fixes' en el body del PR."
            echo "Buscando número de issue en el nombre de la rama: $PR_BRANCH"
            
            ISSUE_NUMBER=$(echo "$PR_BRANCH" | grep -oP '(?<![0-9])\d+(?![0-9])' | head -1)
            
            if [ -z "$ISSUE_NUMBER" ]; then
              echo "⚠️ No se encontró issue ni en el body (closes #N) ni en el nombre de la rama ($PR_BRANCH)"
              echo "   Recomendación: usa 'closes #N' en el body del PR o incluye el número en el nombre de la rama"
            else
              echo "Issue #$ISSUE_NUMBER encontrada en la rama. Validando..."
              
              # Validar que la issue existe
              ISSUE_DATA=$(gh api /repos/${{ github.repository }}/issues/$ISSUE_NUMBER 2>/dev/null || echo "null")
              if [ "$ISSUE_DATA" = "null" ]; then
                echo "⚠️ Issue #$ISSUE_NUMBER no existe en este repo"
              else
                ISSUE_ID=$(echo "$ISSUE_DATA" | jq -r '.node_id')
                # Crear array fake para mantener consistencia con el loop de abajo
                CLOSING_ISSUES="{\"id\":\"$ISSUE_ID\",\"number\":$ISSUE_NUMBER}"
              fi
            fi
          fi

          if [ -z "$CLOSING_ISSUES" ]; then
            echo "Sin issues para procesar"
          else
            # Convertir stream de objetos JSON a un array JSON válido
            ISSUE_LIST=$(echo "$CLOSING_ISSUES" | jq -s -c '.')

            echo "$ISSUE_LIST" | jq -c '.[]' | while IFS= read -r ISSUE_OBJ; do
              ISSUE_ID=$(echo "$ISSUE_OBJ" | jq -r '.id')
              ISSUE_NUM=$(echo "$ISSUE_OBJ" | jq -r '.number')

              ITEM_ID=$(gh api graphql -f query='
                mutation($project: ID!, $issue: ID!) {
                  addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                    item { id }
                  }
                }' \
                -f project="$PROJECT_ID" \
                -f issue="$ISSUE_ID" \
                --jq '.data.addProjectV2ItemById.item.id')

              gh api graphql -f query='
                mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $project,
                    itemId: $item,
                    fieldId: $field,
                    value: { singleSelectOptionId: $option }
                  }) {
                    projectV2Item { id }
                  }
                }' \
                -f project="$PROJECT_ID" \
                -f item="$ITEM_ID" \
                -f field="$STATUS_FIELD_ID" \
                -f option="$IN_REVIEW_OPTION_ID" \
                --silent

              echo "👀 Issue #$ISSUE_NUM movida a IN REVIEW"
            done
          fi

      - name: Agregar label 'needs-qa' al PR
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          # Crear label si no existe
          gh api /repos/${{ github.repository }}/labels \
            -f name="needs-qa" \
            -f color="fbca04" \
            -f description="Pendiente de revisión QA" \
            2>/dev/null || true

          # Agregar label al PR
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "needs-qa" \
            --repo ${{ github.repository }}

      - name: Notificar a QA reviewers con comentario en el PR
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          QA_USERS: ${{ vars.QA_GITHUB_USERS }}
        run: |
          # Formatear menciones de QA
          QA_MENTIONS=""
          for USER in $QA_USERS; do
            QA_MENTIONS="$QA_MENTIONS @$USER"
          done

          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"

          COMMENT="## 🔍 PR listo para revisión QA

          **PR:** [$PR_TITLE]($PR_URL)
          **Branch:** \`$BRANCH\` → \`develop\`
          **Autor:** @$AUTHOR

          ---
          $QA_MENTIONS, este PR requiere vuestra revisión antes de poder ser mergeado.

          **Pasos para revisar:**
          1. Revisar los cambios en este PR
          2. Si está OK → **Approve** el PR (botón 'Review Changes' → 'Approve')
          3. Si necesita correcciones → **Request Changes** (botón 'Review Changes' → 'Request changes') con comentario explicando qué corregir

          La card en el Project Board se moverá automáticamente según vuestra decisión."

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$COMMENT" \
            --repo ${{ github.repository }}

  # ============================================================
  # JOB 5: IN REVIEW → QA APPROVED o IN PROGRESS
  # Se activa cuando alguien submite una review en el PR
  # ============================================================
  handle_qa_review:
    name: "Review QA → QA APPROVED o IN PROGRESS"
    if: github.event_name == 'pull_request_review' && github.event.action == 'submitted'
    runs-on: ubuntu-latest
    steps:
      - name: Verificar si el reviewer es QA
        id: check_reviewer
        env:
          REVIEWER: ${{ github.event.review.user.login }}
          QA_USERS: ${{ vars.QA_GITHUB_USERS }}
          REVIEW_STATE: ${{ github.event.review.state }}
        run: |
          IS_QA=false
          for USER in $QA_USERS; do
            if [ "$REVIEWER" = "$USER" ]; then
              IS_QA=true
              break
            fi
          done

          echo "IS_QA=$IS_QA" >> $GITHUB_OUTPUT
          echo "REVIEW_STATE=$REVIEW_STATE" >> $GITHUB_OUTPUT
          echo "Reviewer: $REVIEWER | Es QA: $IS_QA | Estado: $REVIEW_STATE"

      # --- QA APRUEBA → QA APPROVED ---
      - name: Mover issues a QA APPROVED y notificar maintainers
        if: |
          steps.check_reviewer.outputs.IS_QA == 'true' &&
          steps.check_reviewer.outputs.REVIEW_STATE == 'approved'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ vars.ORGANIZATION }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
            gh api graphql -f query='\
              query($owner: String!, $number: Int!) {\
                organization: organization(login: $owner) {\
                  projectV2(number: $number) {\
                    id\
                    fields(first: 50) {\
                      nodes {\
                        ... on ProjectV2SingleSelectField {\
                          id\
                          name\
                          options { id name }\
                        }\
                      }\
                    }\
                  }\
                }\
                user: user(login: $owner) {\
                  projectV2(number: $number) {\
                    id\
                    fields(first: 50) {\
                      nodes {\
                        ... on ProjectV2SingleSelectField {\
                          id\
                          name\
                          options { id name }\
                        }\
                      }\
                    }\
                  }\
                }\
              }' \
              -f owner="$ORGANIZATION" \
              -F number=$PROJECT_NUMBER \
              > project_data.json

